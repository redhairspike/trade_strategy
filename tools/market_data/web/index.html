<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K 線檢視器 — trade_strategy</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root { --bg:#131722; --panel:#1c2030; --fg:#d1d4dc; --muted:#787b86; --accent:#2962ff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,"Microsoft JhengHei",sans-serif;
         background:var(--bg); color:var(--fg); }
  header { background:var(--panel); border-bottom:1px solid #2a2e39; }
  .bar { display:flex; align-items:center; gap:10px; padding:8px 16px; flex-wrap:wrap; }
  .bar.sub { border-top:1px solid #232733; background:#191d2a; }
  h1 { font-size:15px; margin:0; font-weight:600; }
  label.tag { font-size:12px; color:var(--muted); }
  select, input, button { background:#2a2e39; color:var(--fg); border:1px solid #363a45;
           border-radius:6px; padding:6px 10px; font-size:14px; }
  input[type=date]{ color-scheme:dark; }
  button { cursor:pointer; }
  button.primary { background:var(--accent); border-color:var(--accent); font-weight:600; }
  button.ghost { background:transparent; }
  button.ghost.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  button:disabled { opacity:.5; cursor:default; }
  .seg { display:inline-flex; border:1px solid #363a45; border-radius:6px; overflow:hidden; }
  .seg button { border:0; border-radius:0; background:#2a2e39; padding:6px 11px; }
  .seg button.on { background:var(--accent); color:#fff; font-weight:600; }
  .meta { color:var(--muted); font-size:12px; }
  .legend { font-size:13px; font-variant-numeric:tabular-nums; }
  .legend b { color:var(--fg); font-weight:600; }
  .up { color:#26a69a; } .down { color:#ef5350; }
  #status { font-size:12px; color:var(--muted); min-height:16px; }
  #status.err { color:#ef5350; } #status.ok { color:#26a69a; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent);
         margin-right:6px; animation:pulse 1s infinite; vertical-align:middle; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
  #chart { width:100vw; height:calc(100vh - 96px); }
</style>
</head>
<body>
<header>
  <div class="bar">
    <h1>📈 K 線檢視器</h1>
    <label class="tag">檢視</label>
    <select id="symbol"></select>
    <span class="seg" id="viewIv"></span>
    <button class="ghost" id="hlBtn" title="畫水平線：開啟後點圖表新增一條線；點在既有線上則刪除">▬ 水平線</button>
    <button class="ghost" id="hlClear" title="清除此商品的所有水平線">清除</button>
    <span class="meta" id="meta"></span>
    <span class="legend" id="legend"></span>
  </div>
  <div class="bar sub">
    <label class="tag">下載 / 更新</label>
    <select id="dlSymbol"></select>
    <select id="dlInterval"></select>
    <label class="tag">起始日(日K用)</label>
    <input type="date" id="dlStart" value="2015-01-01">
    <button class="primary" id="dlBtn">下載</button>
    <button class="ghost" id="updBtn">↻ 更新全部</button>
    <span id="status"></span>
  </div>
</header>
<div id="chart"></div>

<script>
const $ = s => document.querySelector(s);
let chart, candleSeries, volSeries;
let SYMBOLS = [];                      // 已下載商品（含各刻度）
let cur = { key:null, interval:null };
let drawMode = false;                  // 水平線畫線模式
let hlines = [];                       // 目前商品的水平線 [{price, line}]

function fmt(n){ return n===undefined||n===null ? '—' : Number(n).toLocaleString('en-US',{maximumFractionDigits:2}); }

function initChart(){
  const el = $('#chart');
  chart = LightweightCharts.createChart(el, {
    layout:{ background:{color:'#131722'}, textColor:'#d1d4dc' },
    grid:{ vertLines:{color:'#1e222d'}, horzLines:{color:'#1e222d'} },
    rightPriceScale:{ borderColor:'#2a2e39' },
    timeScale:{ borderColor:'#2a2e39', rightOffset:6, minBarSpacing:2, timeVisible:false },
    crosshair:{ mode: LightweightCharts.CrosshairMode.Normal },
  });
  candleSeries = chart.addCandlestickSeries({
    upColor:'#26a69a', downColor:'#ef5350', borderVisible:false,
    wickUpColor:'#26a69a', wickDownColor:'#ef5350',
  });
  volSeries = chart.addHistogramSeries({ priceFormat:{type:'volume'}, priceScaleId:'vol' });
  chart.priceScale('vol').applyOptions({ scaleMargins:{top:0.82, bottom:0} });

  chart.subscribeCrosshairMove(p => {
    if(!p || !p.time || !p.seriesData) return;
    const c = p.seriesData.get(candleSeries);
    const v = p.seriesData.get(volSeries);
    if(!c) return;
    const cls = c.close >= c.open ? 'up' : 'down';
    $('#legend').innerHTML =
      `<span class="${cls}">開 <b>${fmt(c.open)}</b>　高 <b>${fmt(c.high)}</b>　`+
      `低 <b>${fmt(c.low)}</b>　收 <b>${fmt(c.close)}</b></span>　量 <b>${fmt(v&&v.value)}</b>`;
  });
  window.addEventListener('resize', ()=> chart.applyOptions({width:el.clientWidth, height:el.clientHeight}));

  // 畫線模式：點圖表新增水平線；點在既有線上（±6px）則刪除
  chart.subscribeClick(param => {
    if(!drawMode || !param.point || !cur.key) return;
    const clickY = param.point.y;
    for(let i=0;i<hlines.length;i++){
      const ly = candleSeries.priceToCoordinate(hlines[i].price);
      if(ly!=null && Math.abs(ly - clickY) <= 6){
        candleSeries.removePriceLine(hlines[i].line);
        hlines.splice(i,1); saveLines(); return;
      }
    }
    const price = candleSeries.coordinateToPrice(clickY);
    if(price!=null){ addLine(price); saveLines(); }
  });
}

// ---- 水平線：存在瀏覽器 localStorage，依商品保存 ----
function lsKey(){ return 'hlines_' + cur.key; }
function saveLines(){ try{ localStorage.setItem(lsKey(), JSON.stringify(hlines.map(h=>h.price))); }catch(e){} }
function loadLinePrices(key){ try{ return JSON.parse(localStorage.getItem('hlines_'+key) || '[]'); }catch(e){ return []; } }

function addLine(price, save){
  const line = candleSeries.createPriceLine({
    price, color:'#f7b500', lineWidth:1,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    axisLabelVisible:true, title:'',
  });
  hlines.push({ price, line });
}
function clearLineObjs(){ hlines.forEach(h=> candleSeries.removePriceLine(h.line)); hlines=[]; }
function renderStoredLines(){ clearLineObjs(); loadLinePrices(cur.key).forEach(p=> addLine(p)); }
function clearLines(){ clearLineObjs(); saveLines(); }

// ---- 檢視：商品下拉 + 刻度分段 ----
function buildViewIntervals(sym){
  const box = $('#viewIv'); box.innerHTML='';
  const s = SYMBOLS.find(x=>x.key===sym); if(!s) return;
  const want = cur.interval && s.intervals.some(i=>i.key===cur.interval) ? cur.interval : s.intervals[0].key;
  for(const iv of s.intervals){
    const b = document.createElement('button');
    b.textContent = iv.label; b.dataset.iv = iv.key;
    if(iv.key===want) b.classList.add('on');
    b.onclick = ()=> loadData(sym, iv.key);
    box.appendChild(b);
  }
  loadData(sym, want);
}

async function refreshSymbols(selectKey, selectIv){
  SYMBOLS = await (await fetch('/api/symbols')).json();
  const sel = $('#symbol');
  const keep = selectKey || sel.value;
  if(selectIv) cur.interval = selectIv;
  sel.innerHTML = '';
  for(const s of SYMBOLS){
    const o = document.createElement('option');
    o.value = s.key; o.textContent = `${s.key}  ${s.name}`;
    sel.appendChild(o);
  }
  sel.onchange = ()=> { cur.interval=null; buildViewIntervals(sel.value); };
  if(SYMBOLS.length){
    sel.value = SYMBOLS.some(s=>s.key===keep) ? keep : SYMBOLS[0].key;
    buildViewIntervals(sel.value);
  } else {
    $('#viewIv').innerHTML=''; $('#meta').textContent='尚無資料，請先在下方下載。';
  }
}

async function loadData(key, interval){
  cur = { key, interval };
  // 更新分段按鈕高亮
  [...$('#viewIv').children].forEach(b=> b.classList.toggle('on', b.dataset.iv===interval));
  const s = SYMBOLS.find(x=>x.key===key);
  const ivMeta = s && s.intervals.find(i=>i.key===interval);
  $('#meta').textContent = ivMeta ? `${ivMeta.rows} 根 ｜ ${ivMeta.start} → ${ivMeta.end}${s.note? ' ｜ '+s.note:''}` : '';
  const d = await (await fetch(`/api/data?symbol=${encodeURIComponent(key)}&interval=${interval}`)).json();
  if(d.error) return;
  chart.applyOptions({ timeScale:{ timeVisible: !!d.intraday, secondsVisible:false } });
  candleSeries.setData(d.candles);
  volSeries.setData(d.volumes);
  chart.timeScale().fitContent();
  renderStoredLines();          // 載入此商品先前畫的水平線
}

// ---- 下載列 ----
async function loadDownloadControls(){
  const insts = await (await fetch('/api/instruments')).json();
  const sSel = $('#dlSymbol'); sSel.innerHTML='';
  for(const it of insts){
    const o = document.createElement('option');
    o.value = it.key; o.dataset.source = it.source;
    o.textContent = `${it.key}  ${it.name}${it.downloaded? ' ✓':''}`;
    sSel.appendChild(o);
  }
  const ivs = await (await fetch('/api/intervals')).json();
  const iSel = $('#dlInterval'); iSel.innerHTML='';
  for(const iv of ivs){
    const o = document.createElement('option');
    o.value = iv.key; o.textContent = iv.label; o.dataset.intraday = iv.intraday;
    iSel.appendChild(o);
  }
  const hint = ()=>{
    const src = sSel.selectedOptions[0]?.dataset.source;
    const intra = iSel.selectedOptions[0]?.dataset.intraday === 'true';
    if(src==='taifex' && intra) setStatus('⚠ 台指分鐘資料免費來源沒有，需券商 API（Shioaji）', 'err');
    else if($('#status').className==='err') setStatus('');
  };
  sSel.onchange = hint; iSel.onchange = hint;
}

function setStatus(msg, cls){ const s=$('#status'); s.className=cls||''; s.innerHTML=msg; }

function pollJob(jobId, name, onDone){
  const poll = async ()=>{
    const st = await (await fetch('/api/download_status?job='+jobId)).json();
    if(st.state==='done'){ setStatus('✓ '+(st.last||'完成'),'ok'); onDone && onDone(st); return; }
    if(st.state==='error'){ setStatus('✗ '+(st.last||'失敗'),'err'); enableBtns(); return; }
    setStatus(`<span class="dot"></span>${name}… ${st.last||''}`);
    setTimeout(poll, 1000);
  };
  setTimeout(poll, 700);
}

function enableBtns(){ $('#dlBtn').disabled=false; $('#updBtn').disabled=false; }
function disableBtns(){ $('#dlBtn').disabled=true; $('#updBtn').disabled=true; }

async function startDownload(){
  const key=$('#dlSymbol').value, interval=$('#dlInterval').value, start=$('#dlStart').value||'2015-01-01';
  disableBtns(); setStatus(`<span class="dot"></span>送出 ${key} [${$('#dlInterval').selectedOptions[0].textContent}] ...`);
  let job;
  try{
    const r = await fetch('/api/download',{method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({symbol:key, interval, start})});
    job = await r.json(); if(job.error) throw new Error(job.error);
  }catch(e){ setStatus('啟動失敗：'+e.message,'err'); enableBtns(); return; }
  pollJob(job.job, `${job.name} 下載中`, async ()=>{
    enableBtns();
    await loadDownloadControls();
    await refreshSymbols(job.key, job.interval);
  });
}

async function updateAll(){
  disableBtns(); setStatus('<span class="dot"></span>更新全部…');
  let job;
  try{
    const r = await fetch('/api/update_all',{method:'POST'});
    job = await r.json(); if(job.error) throw new Error(job.error);
  }catch(e){ setStatus('啟動失敗：'+e.message,'err'); enableBtns(); return; }
  pollJob(job.job, '更新全部', async ()=>{
    enableBtns();
    await loadDownloadControls();
    await refreshSymbols(cur.key, cur.interval);
  });
}

// ---- 啟動前先確認後端是最新版（避免舊 server.py 造成空白/報錯）----
async function checkServer(){
  try{
    const r = await fetch('/api/intervals');
    const j = await r.json();
    if(!Array.isArray(j)) throw new Error('shape');
    return true;
  }catch(e){
    document.body.innerHTML =
      '<div style="max-width:640px;margin:12vh auto;padding:28px;border:1px solid #ef5350;'+
      'border-radius:10px;background:#241a1d;color:#f0d0d0;line-height:1.7">'+
      '<div style="font-size:18px;color:#ef5350;font-weight:700;margin-bottom:10px">⚠ 後端是舊版或未回應</div>'+
      '這個網頁是新版，但正在服務它的 <b>server.py</b> 是舊版程式（或沒啟動）。<br>'+
      '請到終端機把它 <b>Ctrl+C 關掉</b>，重新執行：<br>'+
      '<code style="display:inline-block;margin:8px 0;padding:6px 10px;background:#000;border-radius:6px">'+
      'cd tools/market_data &amp;&amp; python server.py</code><br>'+
      '然後回來按 <b>Ctrl + Shift + R</b> 強制重新整理。'+
      '</div>';
    return false;
  }
}

async function boot(){
  if(!(await checkServer())) return;
  initChart();
  await loadDownloadControls();
  await refreshSymbols();
  $('#dlBtn').onclick = startDownload;
  $('#updBtn').onclick = updateAll;
  $('#hlBtn').onclick = ()=>{ drawMode=!drawMode; $('#hlBtn').classList.toggle('on', drawMode);
    $('#chart').style.cursor = drawMode ? 'crosshair' : 'default'; };
  $('#hlClear').onclick = clearLines;
}
boot();
</script>
</body>
</html>
