<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K 線檢視器 — trade_strategy</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root { --bg:#131722; --panel:#1c2030; --fg:#d1d4dc; --muted:#787b86; --accent:#2962ff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,"Microsoft JhengHei",sans-serif;
         background:var(--bg); color:var(--fg); }
  header { background:var(--panel); border-bottom:1px solid #2a2e39; }
  .bar { display:flex; align-items:center; gap:10px; padding:8px 16px; flex-wrap:wrap; }
  .bar.sub { border-top:1px solid #232733; background:#191d2a; }
  h1 { font-size:15px; margin:0; font-weight:600; }
  label.tag { font-size:12px; color:var(--muted); }
  select, input, button { background:#2a2e39; color:var(--fg); border:1px solid #363a45;
           border-radius:6px; padding:6px 10px; font-size:14px; }
  input[type=date]{ color-scheme:dark; }
  button { cursor:pointer; }
  button.primary { background:var(--accent); border-color:var(--accent); font-weight:600; }
  button.ghost { background:transparent; }
  button.ghost.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  button:disabled { opacity:.5; cursor:default; }
  .seg { display:inline-flex; border:1px solid #363a45; border-radius:6px; overflow:hidden; }
  .seg button { border:0; border-radius:0; background:#2a2e39; padding:6px 11px; }
  .seg button.on { background:var(--accent); color:#fff; font-weight:600; }
  .meta { color:var(--muted); font-size:12px; }
  .legend { font-size:13px; font-variant-numeric:tabular-nums; }
  .legend b { color:var(--fg); font-weight:600; }
  .up { color:#26a69a; } .down { color:#ef5350; }
  #status { font-size:12px; color:var(--muted); min-height:16px; }
  #status.err { color:#ef5350; } #status.ok { color:#26a69a; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent);
         margin-right:6px; animation:pulse 1s infinite; vertical-align:middle; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
  #chartWrap { position:relative; width:100vw; height:calc(100vh - 96px); }
  #chart { width:100%; height:100%; }
  #pen { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:5; }
  #pen.active { pointer-events:auto; cursor:crosshair; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:50;
                    display:flex; align-items:center; justify-content:center; }
  .modal { background:var(--panel); border:1px solid #363a45; border-radius:10px;
           padding:18px 20px; min-width:240px; max-width:90vw; }
  .modal h3 { margin:0 0 12px; font-size:15px; }
  .modal-list { display:flex; flex-direction:column; gap:2px; max-height:50vh; overflow-y:auto; }
  .modal-list label { display:flex; align-items:center; gap:8px; padding:7px 4px;
                       cursor:pointer; font-size:14px; border-radius:6px; }
  .modal-list label:hover { background:#2a2e39; }
  .modal-actions { margin-top:14px; display:flex; justify-content:flex-end; }
</style>
</head>
<body>
<header>
  <div class="bar">
    <h1>📈 K 線檢視器</h1>
    <label class="tag">檢視</label>
    <select id="symbol"></select>
    <span class="seg" id="viewIv"></span>
    <button class="ghost" id="hlBtn" title="畫水平線：開啟後點圖表新增一條線；點在既有線上則刪除">▬ 水平線</button>
    <button class="ghost" id="penBtn" title="畫筆：開啟後在圖上自由手繪（標 W 底、破底翻、頭肩頂等型態）">✏ 畫筆</button>
    <button class="ghost" id="undoBtn" title="復原上一筆手繪">⟲ 復原</button>
    <button class="ghost" id="hlClear" title="清除此商品的所有畫線（水平線＋手繪）">清除</button>
    <button class="ghost" id="patternBtn" title="型態掃描：偵測選取的型態並在圖上標記">🔍 型態掃描</button>
    <button class="ghost" id="ptypeBtn" title="選擇要掃描/顯示哪些型態">⚙ 型態選項</button>
    <span class="meta" id="meta"></span>
    <span class="legend" id="legend"></span>
  </div>
  <div class="bar sub">
    <label class="tag">下載 / 更新</label>
    <select id="dlSymbol"></select>
    <select id="dlInterval"></select>
    <label class="tag">起始日(日K用)</label>
    <input type="date" id="dlStart" value="2015-01-01">
    <button class="primary" id="dlBtn">下載</button>
    <button class="ghost" id="updBtn">↻ 更新全部</button>
    <span id="status"></span>
  </div>
</header>
<div id="ptypeOverlay" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>型態選項</h3>
    <div id="ptypeList" class="modal-list"></div>
    <div class="modal-actions">
      <button class="primary" id="ptypeCloseBtn">關閉</button>
    </div>
  </div>
</div>

<div id="chartWrap">
  <div id="chart"></div>
  <canvas id="pen"></canvas>
</div>

<script>
const $ = s => document.querySelector(s);
let chart, candleSeries, volSeries;
let SYMBOLS = [];                      // 已下載商品（含各刻度）
let cur = { key:null, interval:null };
let drawMode = false;                  // 水平線畫線模式
let hlines = [];                       // 目前商品的水平線 [{price, line}]
let penMode = false;                   // 畫筆模式
let penStrokes = [];                   // 目前商品的手繪：每筆 = [[logical,price],...]
let curStroke = null;                  // 正在畫的那一筆
let penCtx = null;                     // 疊層 canvas 2d context
let patternLines = [];                 // 型態掃描：支撐 price line（不進 localStorage，換圖重掃）
let patternSeries = [];                // 型態掃描：形狀線/頸線 line series（不進 localStorage，換圖重掃）

function fmt(n){ return n===undefined||n===null ? '—' : Number(n).toLocaleString('en-US',{maximumFractionDigits:2}); }

function initChart(){
  const el = $('#chart');
  chart = LightweightCharts.createChart(el, {
    autoSize: true,   // 依容器大小自動調整（用 ResizeObserver，避免初始 0 尺寸）
    layout:{ background:{color:'#131722'}, textColor:'#d1d4dc' },
    grid:{ vertLines:{color:'#1e222d'}, horzLines:{color:'#1e222d'} },
    rightPriceScale:{ borderColor:'#2a2e39' },
    timeScale:{ borderColor:'#2a2e39', rightOffset:6, minBarSpacing:2, timeVisible:false },
    crosshair:{ mode: LightweightCharts.CrosshairMode.Normal },
  });
  candleSeries = chart.addCandlestickSeries({
    upColor:'#26a69a', downColor:'#ef5350', borderVisible:false,
    wickUpColor:'#26a69a', wickDownColor:'#ef5350',
  });
  volSeries = chart.addHistogramSeries({ priceFormat:{type:'volume'}, priceScaleId:'vol' });
  chart.priceScale('vol').applyOptions({ scaleMargins:{top:0.82, bottom:0} });

  chart.subscribeCrosshairMove(p => {
    if(!p || !p.time || !p.seriesData) return;
    const c = p.seriesData.get(candleSeries);
    const v = p.seriesData.get(volSeries);
    if(!c) return;
    const cls = c.close >= c.open ? 'up' : 'down';
    $('#legend').innerHTML =
      `<span class="${cls}">開 <b>${fmt(c.open)}</b>　高 <b>${fmt(c.high)}</b>　`+
      `低 <b>${fmt(c.low)}</b>　收 <b>${fmt(c.close)}</b></span>　量 <b>${fmt(v&&v.value)}</b>`;
  });
  window.addEventListener('resize', ()=>{ sizePen(); redrawPen(); });  // 圖表由 autoSize 處理，這裡只顧疊層

  // 畫線模式：點圖表新增水平線；點在既有線上（±6px）則刪除
  chart.subscribeClick(param => {
    if(!drawMode || !param.point || !cur.key) return;
    const clickY = param.point.y;
    for(let i=0;i<hlines.length;i++){
      const ly = candleSeries.priceToCoordinate(hlines[i].price);
      if(ly!=null && Math.abs(ly - clickY) <= 6){
        candleSeries.removePriceLine(hlines[i].line);
        hlines.splice(i,1); saveLines(); return;
      }
    }
    const price = candleSeries.coordinateToPrice(clickY);
    if(price!=null){ addLine(price); saveLines(); }
  });

  // 手繪會跟著 K 棒縮放/平移 → 每次可視範圍變動就重繪
  chart.timeScale().subscribeVisibleLogicalRangeChange(redrawPen);
  chart.subscribeCrosshairMove(redrawPen);
  setupPen();
}

// ---- 水平線：存在瀏覽器 localStorage，依商品保存 ----
function lsKey(){ return 'hlines_' + cur.key; }
function saveLines(){ try{ localStorage.setItem(lsKey(), JSON.stringify(hlines.map(h=>h.price))); }catch(e){} }
function loadLinePrices(key){ try{ return JSON.parse(localStorage.getItem('hlines_'+key) || '[]'); }catch(e){ return []; } }

function addLine(price, save){
  const line = candleSeries.createPriceLine({
    price, color:'#f7b500', lineWidth:1,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    axisLabelVisible:true, title:'',
  });
  hlines.push({ price, line });
}
function clearLineObjs(){ hlines.forEach(h=> candleSeries.removePriceLine(h.line)); hlines=[]; }
function renderStoredLines(){ clearLineObjs(); loadLinePrices(cur.key).forEach(p=> addLine(p)); }
function clearLines(){ clearLineObjs(); saveLines(); penStrokes=[]; savePen(); redrawPen(); }

// ---- 畫筆（自由手繪，存 K 棒座標 [logical, price]，跟著縮放平移）----
let _lastXY = null;

function sizePen(){
  const c = document.getElementById('pen');
  const W = c.clientWidth, H = c.clientHeight;   // 顯示尺寸由 CSS inset:0 決定
  if(!W || !H) return;                            // 尚未完成布局，等 ResizeObserver 再叫
  const dpr = window.devicePixelRatio || 1;
  c.width = Math.round(W*dpr); c.height = Math.round(H*dpr);
  penCtx = c.getContext('2d');
  penCtx.setTransform(dpr,0,0,dpr,0,0);
}

function screenToData(x,y){
  const l = chart.timeScale().coordinateToLogical(x);
  const p = candleSeries.coordinateToPrice(y);
  return (l==null||p==null) ? null : [l, p];
}
function dataToScreen(pt){
  const x = chart.timeScale().logicalToCoordinate(pt[0]);
  const y = candleSeries.priceToCoordinate(pt[1]);
  return (x==null||y==null) ? null : [x, y];
}

function redrawPen(){
  if(!penCtx) return;
  const c = penCtx.canvas;
  penCtx.clearRect(0, 0, c.clientWidth, c.clientHeight);
  penCtx.strokeStyle = '#ffeb3b'; penCtx.lineWidth = 2;
  penCtx.lineJoin = 'round'; penCtx.lineCap = 'round';
  const all = curStroke ? penStrokes.concat([curStroke]) : penStrokes;
  for(const stroke of all){
    penCtx.beginPath(); let started = false;
    for(const pt of stroke){
      const sc = dataToScreen(pt);
      if(!sc){ started = false; continue; }
      if(!started){ penCtx.moveTo(sc[0], sc[1]); started = true; }
      else penCtx.lineTo(sc[0], sc[1]);
    }
    penCtx.stroke();
  }
}

function setupPen(){
  const c = document.getElementById('pen');
  // 布局完成/尺寸變動時才調整 canvas 解析度並重繪（解決初始 0×0 問題）
  new ResizeObserver(()=>{ sizePen(); redrawPen(); }).observe(document.getElementById('chartWrap'));
  const xy = e => { const r = c.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; };
  c.addEventListener('pointerdown', e => {
    if(!penMode || !cur.key) return;
    try{ c.setPointerCapture(e.pointerId); }catch(_){}
    const [x,y] = xy(e); const d = screenToData(x,y);
    curStroke = d ? [d] : []; _lastXY = [x,y];
    e.preventDefault();
  });
  c.addEventListener('pointermove', e => {
    if(!penMode || !curStroke) return;
    const [x,y] = xy(e);
    if(_lastXY && Math.hypot(x-_lastXY[0], y-_lastXY[1]) < 2.5) return;  // 節流
    const d = screenToData(x,y);
    if(d){ curStroke.push(d); _lastXY = [x,y]; redrawPen(); }
  });
  const finish = () => {
    if(!curStroke) return;
    if(curStroke.length >= 2) { penStrokes.push(curStroke); savePen(); }
    curStroke = null; _lastXY = null; redrawPen();
  };
  c.addEventListener('pointerup', finish);
  c.addEventListener('pointercancel', finish);
  c.addEventListener('pointerleave', finish);
}

// ---- 型態掃描（2B / 頭肩底）：呼叫 /patterns，疊加標記 + 形狀線 + 頸線/支撐線 ----
function clearPatterns(){
  candleSeries.setMarkers([]);
  patternLines.forEach(l => candleSeries.removePriceLine(l));
  patternLines = [];
  patternSeries.forEach(s => chart.removeSeries(s));
  patternSeries = [];
}

function addShapeLine(points, color){
  const s = chart.addLineSeries({
    color, lineWidth:1, lastValueVisible:false, priceLineVisible:false, crosshairMarkerVisible:false,
  });
  s.setData(points);
  patternSeries.push(s);
}

function renderPatterns(patterns){
  clearPatterns();
  const markers = [];
  for(const p of patterns){
    const shapeColor = p.pattern_type === '2B' ? '#42a5f5' : '#ab47bc';
    if(p.left_shoulder_time != null){
      markers.push({ time:p.left_shoulder_time, position:'belowBar', color:'#ffa726', shape:'circle', text:'左肩' });
    }
    markers.push({ time:p.head_time, position:'aboveBar', color:'#ef5350', shape:'arrowDown', text:'頭' });
    markers.push({ time:p.right_shoulder_time, position:'belowBar', color:'#ffa726', shape:'circle', text:'右肩' });
    markers.push({ time:p.entry_time, position:'belowBar', color:'#26a69a', shape:'arrowUp', text:'進場' });

    // 形狀線：連接關鍵擺動點，直接看出型態走勢（左肩→頭→右肩→進場）
    const shapePts = [];
    if(p.left_shoulder_time != null) shapePts.push({ time:p.left_shoulder_time, value:p.left_shoulder_price });
    shapePts.push({ time:p.head_time, value:p.head_price });
    shapePts.push({ time:p.right_shoulder_time, value:p.right_shoulder_price });
    shapePts.push({ time:p.entry_time, value:p.entry_price });
    addShapeLine(shapePts, shapeColor);

    if(p.neckline_start_time != null){
      // 頭肩底：實際的頸線（左肩高點—右肩高點斜線），比水平支撐線更準確
      addShapeLine([
        { time:p.neckline_start_time, value:p.neckline_start_price },
        { time:p.neckline_end_time, value:p.neckline_end_price },
      ], '#ffca28');
    } else {
      // 2B：水平支撐虛線
      patternLines.push(candleSeries.createPriceLine({
        price:p.support_level, color:'#78909c', lineWidth:1,
        lineStyle:LightweightCharts.LineStyle.Dashed, axisLabelVisible:true,
        title:p.pattern_type,
      }));
    }
  }
  markers.sort((a,b)=> (a.time > b.time ? 1 : a.time < b.time ? -1 : 0));
  candleSeries.setMarkers(markers);
}

// ---- 型態選項彈窗：型態清單從後端動態抓，之後新增型態掃描不用改前端 ----
let PATTERN_TYPES = [];          // [{key,label}]，來自 /api/pattern_types
let selectedTypes = new Set();   // 目前勾選的型態 key

async function loadPatternTypes(){
  PATTERN_TYPES = await (await fetch('/api/pattern_types')).json();
  selectedTypes = new Set(PATTERN_TYPES.map(t=>t.key));   // 預設全選
  renderPtypeList();
}

function renderPtypeList(){
  const box = $('#ptypeList'); box.innerHTML = '';
  for(const t of PATTERN_TYPES){
    const label = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = selectedTypes.has(t.key);
    cb.onchange = ()=>{
      if(cb.checked) selectedTypes.add(t.key); else selectedTypes.delete(t.key);
      if(patternLines.length || patternSeries.length) scanPatterns();   // 即時生效
    };
    label.appendChild(cb);
    label.append(t.label);
    box.appendChild(label);
  }
}

function openPtypeModal(){ $('#ptypeOverlay').style.display = 'flex'; }
function closePtypeModal(){ $('#ptypeOverlay').style.display = 'none'; }

function selectedPatternTypes(){ return [...selectedTypes]; }

async function scanPatterns(){
  if(!cur.key) return;
  const types = selectedPatternTypes();
  if(!types.length){ setStatus('請先在「型態選項」勾選至少一種型態', 'err'); return; }
  setStatus('<span class="dot"></span>型態掃描中…');
  try{
    const r = await fetch(`/patterns?symbol=${encodeURIComponent(cur.key)}&interval=${cur.interval}&types=${types.join(',')}`);
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    renderPatterns(d.patterns);
    const labels = PATTERN_TYPES.filter(t=>selectedTypes.has(t.key)).map(t=>t.label);
    setStatus(`✓ 偵測到 ${d.patterns.length} 個型態（${labels.join('、')}）`, 'ok');
  }catch(e){ setStatus('掃描失敗：'+e.message, 'err'); }
}

function penKey(){ return 'pen_' + cur.key; }
function savePen(){ try{ localStorage.setItem(penKey(),
  JSON.stringify(penStrokes.map(s => s.map(pt => [+pt[0].toFixed(3), +pt[1].toFixed(4)])))); }catch(e){} }
function loadPen(key){ try{ return JSON.parse(localStorage.getItem('pen_'+key) || '[]'); }catch(e){ return []; } }
function renderPen(){ penStrokes = loadPen(cur.key); redrawPen(); }
function undoPen(){ penStrokes.pop(); savePen(); redrawPen(); }

// ---- 檢視：商品下拉 + 刻度分段 ----
function buildViewIntervals(sym){
  const box = $('#viewIv'); box.innerHTML='';
  const s = SYMBOLS.find(x=>x.key===sym); if(!s) return;
  const want = cur.interval && s.intervals.some(i=>i.key===cur.interval) ? cur.interval : s.intervals[0].key;
  for(const iv of s.intervals){
    const b = document.createElement('button');
    b.textContent = iv.label; b.dataset.iv = iv.key;
    if(iv.key===want) b.classList.add('on');
    b.onclick = ()=> loadData(sym, iv.key);
    box.appendChild(b);
  }
  loadData(sym, want);
}

async function refreshSymbols(selectKey, selectIv){
  SYMBOLS = await (await fetch('/api/symbols')).json();
  const sel = $('#symbol');
  const keep = selectKey || sel.value;
  if(selectIv) cur.interval = selectIv;
  sel.innerHTML = '';
  for(const s of SYMBOLS){
    const o = document.createElement('option');
    o.value = s.key; o.textContent = `${s.key}  ${s.name}`;
    sel.appendChild(o);
  }
  sel.onchange = ()=> { cur.interval=null; buildViewIntervals(sel.value); };
  if(SYMBOLS.length){
    sel.value = SYMBOLS.some(s=>s.key===keep) ? keep : SYMBOLS[0].key;
    buildViewIntervals(sel.value);
  } else {
    $('#viewIv').innerHTML=''; $('#meta').textContent='尚無資料，請先在下方下載。';
  }
}

async function loadData(key, interval){
  cur = { key, interval };
  // 更新分段按鈕高亮
  [...$('#viewIv').children].forEach(b=> b.classList.toggle('on', b.dataset.iv===interval));
  const s = SYMBOLS.find(x=>x.key===key);
  const ivMeta = s && s.intervals.find(i=>i.key===interval);
  $('#meta').textContent = ivMeta ? `${ivMeta.rows} 根 ｜ ${ivMeta.start} → ${ivMeta.end}${s.note? ' ｜ '+s.note:''}` : '';
  const d = await (await fetch(`/api/data?symbol=${encodeURIComponent(key)}&interval=${interval}`)).json();
  if(d.error) return;
  chart.applyOptions({ timeScale:{ timeVisible: !!d.intraday, secondsVisible:false } });
  candleSeries.setData(d.candles);
  volSeries.setData(d.volumes);
  chart.timeScale().fitContent();
  renderStoredLines();          // 載入此商品先前畫的水平線
  renderPen();                  // 載入此商品先前的手繪
  clearPatterns();              // 型態掃描結果不持久化，換商品/刻度需重新掃描
}

// ---- 下載列 ----
async function loadDownloadControls(selectKey){
  const insts = await (await fetch('/api/instruments')).json();
  const sSel = $('#dlSymbol');
  const keep = selectKey || sSel.value;   // 重建選單後把選取值還原，不要跳回第一個
  sSel.innerHTML='';
  for(const it of insts){
    const o = document.createElement('option');
    o.value = it.key; o.dataset.source = it.source;
    o.textContent = `${it.key}  ${it.name}${it.downloaded? ' ✓':''}`;
    sSel.appendChild(o);
  }
  if(insts.some(it=>it.key===keep)) sSel.value = keep;
  const ivs = await (await fetch('/api/intervals')).json();
  const iSel = $('#dlInterval'); iSel.innerHTML='';
  for(const iv of ivs){
    const o = document.createElement('option');
    o.value = iv.key; o.textContent = iv.label; o.dataset.intraday = iv.intraday;
    iSel.appendChild(o);
  }
  const hint = ()=>{
    const src = sSel.selectedOptions[0]?.dataset.source;
    const intra = iSel.selectedOptions[0]?.dataset.intraday === 'true';
    if(src==='taifex' && intra) setStatus('⚠ 台指分鐘資料免費來源沒有，需券商 API（Shioaji）', 'err');
    else if($('#status').className==='err') setStatus('');
  };
  sSel.onchange = hint; iSel.onchange = hint;
}

function setStatus(msg, cls){ const s=$('#status'); s.className=cls||''; s.innerHTML=msg; }

function pollJob(jobId, name, onDone){
  const poll = async ()=>{
    const st = await (await fetch('/api/download_status?job='+jobId)).json();
    if(st.state==='done'){ setStatus('✓ '+(st.last||'完成'),'ok'); onDone && onDone(st); return; }
    if(st.state==='error'){ setStatus('✗ '+(st.last||'失敗'),'err'); enableBtns(); return; }
    setStatus(`<span class="dot"></span>${name}… ${st.last||''}`);
    setTimeout(poll, 1000);
  };
  setTimeout(poll, 700);
}

function enableBtns(){ $('#dlBtn').disabled=false; $('#updBtn').disabled=false; }
function disableBtns(){ $('#dlBtn').disabled=true; $('#updBtn').disabled=true; }

async function startDownload(){
  const key=$('#dlSymbol').value, interval=$('#dlInterval').value, start=$('#dlStart').value||'2015-01-01';
  disableBtns(); setStatus(`<span class="dot"></span>送出 ${key} [${$('#dlInterval').selectedOptions[0].textContent}] ...`);
  let job;
  try{
    const r = await fetch('/api/download',{method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({symbol:key, interval, start})});
    job = await r.json(); if(job.error) throw new Error(job.error);
  }catch(e){ setStatus('啟動失敗：'+e.message,'err'); enableBtns(); return; }
  pollJob(job.job, `${job.name} 下載中`, async ()=>{
    enableBtns();
    await loadDownloadControls(job.key);
    await refreshSymbols(job.key, job.interval);
  });
}

async function updateAll(){
  disableBtns(); setStatus('<span class="dot"></span>更新全部…');
  let job;
  try{
    const r = await fetch('/api/update_all',{method:'POST'});
    job = await r.json(); if(job.error) throw new Error(job.error);
  }catch(e){ setStatus('啟動失敗：'+e.message,'err'); enableBtns(); return; }
  pollJob(job.job, '更新全部', async ()=>{
    enableBtns();
    await loadDownloadControls();
    await refreshSymbols(cur.key, cur.interval);
  });
}

// ---- 啟動前先確認後端是最新版（避免舊 server.py 造成空白/報錯）----
async function checkServer(){
  try{
    const r = await fetch('/api/intervals');
    const j = await r.json();
    if(!Array.isArray(j)) throw new Error('shape');
    return true;
  }catch(e){
    document.body.innerHTML =
      '<div style="max-width:640px;margin:12vh auto;padding:28px;border:1px solid #ef5350;'+
      'border-radius:10px;background:#241a1d;color:#f0d0d0;line-height:1.7">'+
      '<div style="font-size:18px;color:#ef5350;font-weight:700;margin-bottom:10px">⚠ 後端是舊版或未回應</div>'+
      '這個網頁是新版，但正在服務它的 <b>server.py</b> 是舊版程式（或沒啟動）。<br>'+
      '請到終端機把它 <b>Ctrl+C 關掉</b>，重新執行：<br>'+
      '<code style="display:inline-block;margin:8px 0;padding:6px 10px;background:#000;border-radius:6px">'+
      'cd tools/market_data &amp;&amp; python server.py</code><br>'+
      '然後回來按 <b>Ctrl + Shift + R</b> 強制重新整理。'+
      '</div>';
    return false;
  }
}

async function boot(){
  if(!(await checkServer())) return;
  initChart();
  await loadDownloadControls();
  await refreshSymbols();
  await loadPatternTypes();
  $('#dlBtn').onclick = startDownload;
  $('#updBtn').onclick = updateAll;

  function setHlMode(on){ drawMode = on; $('#hlBtn').classList.toggle('on', on);
    $('#chart').style.cursor = on ? 'crosshair' : 'default'; }
  function setPenMode(on){ penMode = on; $('#penBtn').classList.toggle('on', on);
    $('#pen').classList.toggle('active', on); }   // active 時 canvas 接收滑鼠、圖表不被平移

  $('#hlBtn').onclick = ()=>{ const on=!drawMode; if(on) setPenMode(false); setHlMode(on); };
  $('#penBtn').onclick = ()=>{ const on=!penMode; if(on) setHlMode(false); setPenMode(on); };
  $('#undoBtn').onclick = undoPen;
  $('#hlClear').onclick = clearLines;
  $('#patternBtn').onclick = scanPatterns;
  $('#ptypeBtn').onclick = openPtypeModal;
  $('#ptypeCloseBtn').onclick = closePtypeModal;
  $('#ptypeOverlay').onclick = (e)=>{ if(e.target.id==='ptypeOverlay') closePtypeModal(); };
}
boot();
</script>
